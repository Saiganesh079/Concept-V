<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saiganesh — Automotive Design</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ARCHITECTURAL GRID -->
<div class="grid-overlay"></div>

<!-- AUTOMOTIVE FLOW LINES -->
<svg class="flow-lines" viewBox="0 0 1440 900" preserveAspectRatio="none">
  <path d="M0 200 Q 720 100 1440 300" />
  <path d="M0 500 Q 720 650 1440 450" />
</svg>

<header class="container">
  <div class="grid">
    <div class="col-8">
      <h1>SAIGANESH<br>PENTA</h1>
    </div>
    <div class="col-4 right">
      <p>Automotive Designer<br>Berlin, Germany</p>
    </div>
  </div>
</header>

<section class="container project">
  <div class="grid">

    <div class="col-3 meta">
      <span>01</span>
      <h2>F1 Concept</h2>
      <p>Performance-driven aerodynamic exploration.</p>
    </div>

    <div class="col-9">
      <video class="hover-video" muted loop>
        <source src="Images/f1.mp4" type="video/mp4">
      </video>

      <div class="image-grid">
        <img src="Images/F1_1.png">
        <img src="Images/F1_2.png">
        <img src="Images/F1_3.png">
        <img src="Images/F1_4.png">
        <img src="Images/F1_5.png">
        <img src="Images/F1_6.png">
        <img src="Images/F1_7.png">
      </div>
    </div>

  </div>
</section>

<section class="container project">
  <div class="grid">

    <div class="col-3 meta">
      <span>02</span>
      <h2>Concept Vehicle</h2>
      <p>Future mobility and surface exploration.</p>
    </div>

    <div class="col-9">
      <video class="hover-video" muted loop>
        <source src="Images/SpaceCar.mp4" type="video/mp4">
      </video>

      <div class="image-grid">
        <img src="Images/SpaceCar0.png">
        <img src="Images/SpaceCar1.png">
        <img src="Images/SpaceCar2.png">
        <img src="Images/SpaceCar3.png">
        <img src="Images/SpaceCar4.png">
      </div>
    </div>

  </div>
</section>

<footer class="container footer">
  <div class="grid">
    <div class="col-12">
      <p>© 2026 — Saiganesh Penta</p>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
